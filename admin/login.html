
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="login-body">

<div class="login-box">

    <h1>Admin Login</h1>

    <form id="loginForm">

        <input
        type="email"
        placeholder="Admin Email"
        required>

        <input
        type="password"
        placeholder="Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>
<p style="margin-top:20px;">

    Don't have account?

    <a href="register.html">
        Register
    </a>

</p>
</div>

<script src="login.js"></script>

</body>

</html>
